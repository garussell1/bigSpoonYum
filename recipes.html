<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Airtable Embed</title>
  <style>
    /* Full-page, responsive iframe */
    html, body {
      height: 100%;
      margin: 0;
      background: #f7f7f8;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      padding: 12px 16px;
      background: white;
      border-bottom: 1px solid #e6e6e6;
    }
    .frame {
      position: relative;
      height: 100%;
    }
    .frame iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1 style="margin:0; font-size:18px;">Recipes Database</h1>
      <p style="margin:4px 0 0; color:#666; font-size:14px;">
        Embedded Airtable view
      </p>
    </header>

    <div class="frame" role="region" aria-label="Airtable embedded view">
      <!-- Replace the src below with your Airtable embed URL -->
      <iframe class="airtable-embed" src="https://airtable.com/embed/apptJZgREcfP158TD/shrI5Ve0qjBfQtbz4" frameborder="0" onmousewheel="" width="100%" height="533" style="background: transparent; border: 1px solid #ccc;"></iframe>
    </div>
  </div>
</body>
</html>
